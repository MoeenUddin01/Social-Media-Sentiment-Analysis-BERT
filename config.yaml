model:
  name: "bert-base-uncased"
  num_labels: 3
  dropout: 0.3

training:
  batch_size: 32
  max_length: 128
  epochs: 3
  num_epochs: 10
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  gradient_clip: 1.0
  gradual_unfreeze: true
  freeze_epochs: 1
  top_k_checkpoints: 3
  checkpoint_dir: "artifacts/checkpoints"

data:
  raw_dir: "dataset/raw"
  processed_dir: "dataset/processed"
  train_file: "train_cleaned.csv"
  val_file: "val_cleaned.csv"
  test_file: "test_cleaned.csv"
  text_column: "cleaned_text"
  label_column: "label"
  train_split: 0.7
  val_split: 0.2
  test_split: 0.1
  batch_size: 32
  num_workers: 4
  pin_memory: true

checkpoints:
  save_dir: "artifacts/checkpoints"
  save_best: true
  save_every_epoch: false

evaluation:
  save_plots: true
  report_dir: "artifacts/checkpoints"
  top_k_checkpoints: 3

logging:
  level: "INFO"
  log_dir: "artifacts/logs"
